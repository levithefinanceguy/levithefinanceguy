name: Weekly Portfolio Recap

on:
  schedule:
    # Every Friday at 9:30 PM UTC (4:30 PM ET, after market close)
    - cron: "30 21 * * 5"
  workflow_dispatch: # Manual trigger

jobs:
  recap:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly recap
        run: node scripts/weekly-recap.mjs

      - name: Commit and push if new post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || (git commit -m "Weekly portfolio recap" && git push)
